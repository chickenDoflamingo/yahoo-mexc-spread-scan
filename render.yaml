services:
  - type: web
    name: yahoo-mexc-spread-monitor
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SPREAD_MONITOR_DB_PATH
        value: /tmp/spread-monitor.db
      - key: PUBLIC_BASIC_AUTH_USER
        sync: false
      - key: PUBLIC_BASIC_AUTH_PASSWORD
        sync: false
